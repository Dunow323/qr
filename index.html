<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">

<style>
html { color-scheme: light; }

body{
 font-family:Arial;
 background:#FFF9D6;
 margin:0;
 color:#000;
}

.header-img{
 width:100%;
 max-height:160px;
 object-fit:cover;
}

.wrap{max-width:700px;margin:auto}

.card{
 background:#fff;
 margin:12px;
 padding:16px;
 border-radius:14px;
}

.category{
 margin:16px;
 font-weight:bold;
 color:#2F6F2F;
}

.menu{
 display:flex;
 justify-content:space-between;
 padding:10px;
 border-bottom:1px solid #eee;
}

button{
 background:#2F6F2F;
 color:#fff;
 border:none;
 border-radius:8px;
 padding:6px 10px;
}

button:active{transform:scale(0.95);}

.cart-item{
 display:flex;
 justify-content:space-between;
 margin:6px 0;
}

.cartbtn{
 width:100%;
 padding:14px;
 font-size:18px;
}

#loading{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.4);
 display:none;
 align-items:center;
 justify-content:center;
}

#loading div{
 background:white;
 padding:20px;
 border-radius:10px;
}

/* 다크모드 방지 */
@media (prefers-color-scheme: dark) {
 body { background:#FFF9D6 !important; color:#000 !important; }
 .card { background:#fff !important; }
}
</style>
</head>

<body>

<img src="https://raw.githubusercontent.com/Dunow323/qr/main/KakaoTalk_20260603_181532728.png" class="header-img">

<div class="wrap">

<div class="card">
<input id="customerName" placeholder="이름 입력">
</div>

<div id="menuList"></div>

<div class="card">
<h3>🛒 장바구니</h3>
<div id="cart"></div>
<hr>
<p><b>총액: <span id="total">0</span>원</b></p>
<button class="cartbtn" onclick="confirmOrder()">주문하기</button>
</div>

</div>

<div id="loading"><div>주문 전송중...</div></div>

<script>

const categories = [
{ name:"⭐ 음료", items:[
["아이스아메리카노",2500],
["아이스티",2500],
["말차라떼",3500]
]},
{ name:"⭐ 식사", items:[
["김치볶음밥",5000],
["치킨마요",4500]
]}
];

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbw6iWx8S79kqUS3QpCpsRaMym4XDqSmBLDK7mh19MqVyEg7dX4Hcbbxa8hWfEONnjWb/exec";

const cart={};

function renderMenus(){
 const box=document.getElementById("menuList");

 categories.forEach(cat=>{
  box.innerHTML += `<div class="category">${cat.name}</div>`;

  cat.items.forEach(m=>{
   box.innerHTML += `
    <div class="menu">
     <span>${m[0]} (${m[1]}원)</span>
     <button onclick="addItem('${m[0]}',${m[1]})">담기</button>
    </div>`;
  });
 });
}

function addItem(name,price){
 if(!cart[name]) cart[name]={qty:0,price:price};
 cart[name].qty++;
 renderCart();
}

function renderCart(){
 let html="";
 let total=0;

 for(const item in cart){
   const qty = cart[item].qty;
   const price = cart[item].price;
   const sum = qty * price;
   total += sum;

   html += `
   <div class="cart-item">
     <span>${item} x ${qty}</span>
     <span>${sum}원</span>
   </div>`;
 }

 document.getElementById("cart").innerHTML=html;
 document.getElementById("total").innerText=total;
}

/* 🔥 확인 단계 */
function confirmOrder(){
 if(Object.keys(cart).length===0){
   alert("장바구니가 비어있음");
   return;
 }

 if(!confirm("이대로 주문할까요?")){
   return;
 }

 submitOrder();
}

function submitOrder(){

 document.getElementById("loading").style.display="flex";

 fetch(SCRIPT_URL,{
   method:"POST",
   mode:"no-cors",
   body:JSON.stringify({items:cart})
 });

 const orderNo="A"+(Math.floor(Math.random()*900)+100);

 setTimeout(()=>{
   document.getElementById("loading").style.display="none";
   alert("주문 완료\n주문번호: "+orderNo);
 },1000);
}

renderMenus();

</script>

</body>
</html>
