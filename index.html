<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR 주문</title>

<style>
body{font-family:Arial,sans-serif;background:#f5f5f5;margin:0;padding-bottom:90px}
header{background:#2ac1bc;color:#fff;padding:16px;font-size:22px;font-weight:bold}
.wrap{max-width:700px;margin:auto}

.card{background:#fff;margin:10px;padding:14px;border-radius:12px}

.menu{display:flex;justify-content:space-between;align-items:center}

/* 🔥 버튼 스타일 업그레이드 */
button{
 border:none;
 border-radius:10px;
 padding:10px 14px;
 cursor:pointer;
 transition:0.15s;
}

button:active{
 transform:scale(0.95);
 background:#1daaa5;
}

.add{background:#2ac1bc;color:white}

.cartbtn{
 width:100%;
 background:#2ac1bc;
 color:#fff;
 font-size:18px;
}

/* 🔥 로딩 오버레이 */
#loading{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.4);
 display:none;
 align-items:center;
 justify-content:center;
 z-index:999;
}

#loading div{
 background:white;
 padding:20px 30px;
 border-radius:10px;
 font-size:18px;
 font-weight:bold;
}

input{width:100%;padding:10px;box-sizing:border-box}
</style>
</head>

<body>

<header>QR 주문</header>

<div class="wrap">

<div class="card">
<label>주문자 이름</label>
<input id="customerName" placeholder="이름 입력">
</div>

<div id="menuList"></div>

<div class="card">
<h3>장바구니</h3>
<div id="cart"></div>
<p><b>총액: <span id="total">0</span>원</b></p>
<button class="cartbtn" onclick="submitOrder()">주문하기</button>
</div>

</div>

<!-- 🔥 로딩 UI -->
<div id="loading">
  <div>주문 전송중...</div>
</div>

<script>
const menus=[
["아메리카노",2500],
["카페라떼",3500],
["콜라",2000],
["사이다",2000],
["떡볶이",4500]
];

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbw6iWx8S79kqUS3QpCpsRaMym4XDqSmBLDK7mh19MqVyEg7dX4Hcbbxa8hWfEONnjWb/exec";

const cart={};

function renderMenus(){
 const box=document.getElementById("menuList");
 menus.forEach(m=>{
  box.innerHTML += `
   <div class="card menu">
    <div>
      <div><b>${m[0]}</b></div>
      <div>${m[1].toLocaleString()}원</div>
    </div>
    <button class="add" onclick="addItem('${m[0]}')">담기</button>
   </div>`;
 });
}

function addItem(name){
 cart[name]=(cart[name]||0)+1;
 renderCart();
}

function renderCart(){
 let html="";
 let total=0;

 for(const item in cart){
   const price=menus.find(m=>m[0]===item)[1];
   total += price*cart[item];

   html += `
   <div style="display:flex;justify-content:space-between;margin:6px 0">
     <span>${item} x ${cart[item]}</span>
     <span>${(price*cart[item]).toLocaleString()}원</span>
   </div>`;
 }

 document.getElementById("cart").innerHTML=html;
 document.getElementById("total").innerText=total.toLocaleString();
}

async function submitOrder(){

 const name=document.getElementById("customerName").value.trim();

 if(!name){
   alert("이름을 입력하세요.");
   return;
 }

 if(Object.keys(cart).length === 0){
   alert("메뉴를 선택하세요.");
   return;
 }

 // 🔥 로딩 표시
 document.getElementById("loading").style.display="flex";

 const items=[];
 let total=0;

 for(const item in cart){
   const price=menus.find(m=>m[0]===item)[1];

   items.push({
      menu:item,
      qty:cart[item],
      price:price
   });

   total += price*cart[item];
 }

 const order={
   customer:name,
   items:items,
   total:total
 };

 fetch(SCRIPT_URL,{
   method:"POST",
   mode:"no-cors",
   body:JSON.stringify(order)
 });

 setTimeout(()=>{
   document.getElementById("loading").style.display="none";
   alert("주문 완료!");
 },1000);
}

renderMenus();
</script>

</body>
</html>
