<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">

<style>
html { color-scheme: light; }

body{
 font-family:Arial;
 background:#FFF9D6;
 margin:0;
}

/* 상단 */
.header-img{
 width:100%;
 max-height:160px;
 object-fit:cover;
}

/* 레이아웃 */
.wrap{
 max-width:700px;
 margin:auto;
 padding-bottom:120px;
}

/* 카테고리 */
.category-box{
 background:#F3FBEF;
 margin:14px;
 border-radius:16px;
 overflow:hidden;
 border:1px solid #d6e9d2;
}

.category-title{
 background:#2F6F2F;
 color:white;
 padding:12px;
 font-weight:bold;
}

.menu{
 display:flex;
 justify-content:space-between;
 padding:12px;
 background:#fff;
 border-bottom:1px solid #eee;
}

/* 버튼 */
button{
 background:#2F6F2F;
 color:white;
 border:none;
 border-radius:6px;
 padding:6px 10px;
 cursor:pointer;
}

button:active{transform:scale(0.95);}

/* 장바구니 버튼 */
.cart-btn{
 position:fixed;
 bottom:20px;
 left:50%;
 transform:translateX(-50%);
 padding:14px 20px;
 border-radius:30px;
 font-weight:bold;
}

/* 모달 */
#modal{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.5);
 display:none;
 justify-content:center;
 align-items:center;
}

.modal-box{
 background:white;
 width:90%;
 max-width:400px;
 border-radius:16px;
 padding:20px;
}

.cart-item{
 display:flex;
 justify-content:space-between;
 align-items:center;
 margin:10px 0;
}

.cart-controls{
 display:flex;
 gap:5px;
 align-items:center;
}

/* 로딩 */
#loading{
 position:fixed;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.4);
 display:none;
 justify-content:center;
 align-items:center;
}
</style>
</head>

<body>

<img src="https://raw.githubusercontent.com/Dunow323/qr/main/KakaoTalk_20260603_181532728.png" class="header-img">

<div class="wrap">

<input id="name" placeholder="이름 입력" style="margin:14px;width:90%;padding:10px">

<div id="menu"></div>

</div>

<button class="cart-btn" onclick="openCart()">🛒 장바구니</button>

<!-- 모달 -->
<div id="modal">
 <div class="modal-box">
   <h3>장바구니</h3>
   <div id="cart"></div>
   <p>총액: <span id="total">0</span>원</p>

   <button onclick="order()">주문하기</button>
   <button onclick="closeCart()">닫기</button>
 </div>
</div>

<div id="loading"><div style="background:white;padding:20px;">주문중...</div></div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbzFM-gBnXkLXqmzMqd_xtQrawiHmF4umRvln3Zg9n0nEJfcuYeVazIFA8zEBoTFrdV-/exec";

const categories=[
{
 name:"⭐ 음료",
 items:[
 ["아메리카노",2500],
 ["아이스티",2500],
 ["콜라",2000]
 ]
}
];

const cart={};

function renderMenu(){
 let html="";

 categories.forEach(cat=>{
  html+=`<div class="category-box"><div class="category-title">${cat.name}</div>`;

  cat.items.forEach(m=>{
   html+=`
   <div class="menu">
    <span>${m[0]} (${m[1]}원)</span>
    <button onclick="add('${m[0]}',${m[1]})">담기</button>
   </div>`;
  });

  html+=`</div>`;
 });

 document.getElementById("menu").innerHTML=html;
}

function add(name,price){
 if(!cart[name]) cart[name]={qty:0,price:price};
 cart[name].qty++;
 drawCart();
}

function drawCart(){
 let html="";
 let total=0;

 for(let k in cart){
  let d=cart[k];
  let sum=d.qty*d.price;
  total+=sum;

  html+=`
  <div class="cart-item">
   <span>${k}</span>
   <div class="cart-controls">
    <button onclick="qty('${k}',-1)">-</button>
    ${d.qty}
    <button onclick="qty('${k}',1)">+</button>
    <button onclick="del('${k}')">❌</button>
   </div>
   <span>${sum}원</span>
  </div>`;
 }

 document.getElementById("cart").innerHTML=html;
 document.getElementById("total").innerText=total;
}

function qty(name,n){
 cart[name].qty+=n;
 if(cart[name].qty<=0) delete cart[name];
 drawCart();
}

function del(name){
 delete cart[name];
 drawCart();
}

function openCart(){
 document.getElementById("modal").style.display="flex";
 drawCart();
}

function closeCart(){
 document.getElementById("modal").style.display="none";
}

function order(){

 const name=document.getElementById("name").value;

 if(!name){alert("이름 입력");return;}
 if(Object.keys(cart).length==0){alert("비어있음");return;}

 document.getElementById("loading").style.display="flex";

 fetch(SCRIPT_URL,{
   method:"POST",
   mode:"no-cors",
   body:JSON.stringify({customer:name,items:cart})
 });

 setTimeout(()=>{
  document.getElementById("loading").style.display="none";
  alert("주문 완료!");
  closeCart();
 },1000);
}

renderMenu();

</script>

</body>
</html>
