<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">

<title>QR 주문</title>

<style>
html { color-scheme: light; }

body{
 font-family:Arial;
 background:#FFF9D6;
 margin:0;
}

/* 상단 이미지 */
.header-img{
 width:100%;
 max-height:160px;
 object-fit:cover;
}

.wrap{
 max-width:700px;
 margin:auto;
 padding-bottom:100px;
}

/* 카테고리 */
.category-box{
 background:#fff;
 margin:14px;
 border-radius:16px;
 overflow:hidden;
 box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.category-title{
 background:#2F6F2F;
 color:white;
 padding:12px;
 font-weight:bold;
}

.menu{
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:12px;
 border-bottom:1px solid #eee;
}

button{
 background:#2F6F2F;
 color:white;
 border:none;
 border-radius:6px;
 padding:6px 10px;
 cursor:pointer;
}

button:active{
 transform:scale(0.95);
}

/* 장바구니 */
.cart-box{
 background:#fff;
 margin:14px;
 padding:16px;
 border-radius:16px;
 border:2px solid #2F6F2F;
}

.cart-item{
 display:flex;
 justify-content:space-between;
 align-items:center;
 margin:8px 0;
}

.cart-controls{
 display:flex;
 gap:5px;
 align-items:center;
}

.total{
 font-weight:bold;
 margin-top:10px;
}

/* 입력 */
input{
 margin:14px;
 width:90%;
 padding:10px;
}

/* 로딩 */
#loading{
 position:fixed;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.4);
 display:none;
 align-items:center;
 justify-content:center;
}

#loading div{
 background:white;
 padding:20px;
 border-radius:10px;
}

/* 다크모드 방지 */
@media (prefers-color-scheme: dark){
 body{background:#FFF9D6 !important;}
 .category-box,.cart-box{background:#fff !important;}
}
</style>
</head>

<body>

<img src="https://raw.githubusercontent.com/Dunow323/qr/main/KakaoTalk_20260603_181532728.png" class="header-img">

<div class="wrap">

<input id="customerName" placeholder="이름 입력">

<div id="menuList"></div>

<div class="cart-box">
<h3>🛒 장바구니</h3>
<div id="cart"></div>

<p class="total">총액: <span id="total">0</span>원</p>

<button onclick="submitOrder()">주문하기</button>
</div>

</div>

<div id="loading"><div>주문 전송중...</div></div>

<script>

// 🔥 메뉴 전체
const categories = [
{
 name:"⭐ 음료",
 items:[
 ["아이스아메리카노",2500],
 ["아이스티(복숭아)",2500],
 ["말차라떼",3500],
 ["초코라떼",3500],
 ["자몽에이드",4000],
 ["청포도에이드",4000],
 ["레몬에이드",4000],
 ["얼박사",3000],
 ["핫식스",3000],
 ["콜라",2000],
 ["사이다",2000]
 ]
},
{
 name:"⭐ 식사",
 items:[
 ["새우볶음밥",5000],
 ["김치볶음밥",5000],
 ["스팸마요",4500],
 ["치킨마요",4500],
 ["간계밥",4000],
 ["육개장",6000],
 ["짜파게티",4000],
 ["불닭",4000]
 ]
},
{
 name:"⭐ 핫도그",
 items:[
 ["핫도그(치즈)",3000],
 ["핫도그(칠리)",3000],
 ["핫도그(어니언)",3000]
 ]
},
{
 name:"⭐ 디저트",
 items:[
 ["맥모닝",3500],
 ["크로크무슈",4000],
 ["와플",3500]
 ]
}
];

// 🔥 너 최신 Apps Script URL
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbwn19ZQkE-cg2sMSrZFSGDyz2l8QyXXUSbNJVX45MPqSEekxXTnXb6gIuQsiyWuAeb_/exec";

const cart={};

// 메뉴 출력
function renderMenus(){
 const box=document.getElementById("menuList");

 categories.forEach(cat=>{
  box.innerHTML += `<div class="category-box"><div class="category-title">${cat.name}</div>`;

  cat.items.forEach(m=>{
   box.innerHTML += `
    <div class="menu">
     <span>${m[0]} (${m[1]}원)</span>
     <button onclick="addItem('${m[0]}',${m[1]})">담기</button>
    </div>`;
  });

  box.innerHTML += `</div>`;
 });
}

// 추가
function addItem(name,price){
 if(!cart[name]) cart[name]={qty:0,price:price};
 cart[name].qty++;
 renderCart();
}

// 장바구니 렌더
function renderCart(){
 let html="";
 let total=0;

 for(const item in cart){
   const data=cart[item];
   const sum=data.qty * data.price;
   total += sum;

   html += `
   <div class="cart-item">
     <span>${item}</span>

     <div class="cart-controls">
       <button onclick="changeQty('${item}',-1)">-</button>
       ${data.qty}
       <button onclick="changeQty('${item}',1)">+</button>
       <button onclick="removeItem('${item}')">❌</button>
     </div>

     <span>${sum}원</span>
   </div>`;
 }

 document.getElementById("cart").innerHTML=html;
 document.getElementById("total").innerText=total;
}

// 수량 변경
function changeQty(name,delta){
 cart[name].qty += delta;
 if(cart[name].qty <= 0) delete cart[name];
 renderCart();
}

// 삭제
function removeItem(name){
 delete cart[name];
 renderCart();
}

// 주문
async function submitOrder(){

 const name=document.getElementById("customerName").value.trim();

 if(!name){ alert("이름 입력"); return; }
 if(Object.keys(cart).length===0){ alert("장바구니 비어있음"); return; }

 document.getElementById("loading").style.display="flex";

 const res = await fetch(SCRIPT_URL,{
   method:"POST",
   headers:{ "Content-Type":"application/json" },
   body:JSON.stringify({
     customer:name,
     items:cart
   })
 });

 const data = await res.json();

 document.getElementById("loading").style.display="none";

 alert("주문 완료!\n주문번호: " + data.orderNo);

}

renderMenus();

</script>

</body>
</html>
